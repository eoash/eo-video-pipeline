name: secret-scan

# 새 커밋 범위만 검사 — 과거 history는 스캔하지 않음(기존 미스크럽 시크릿으로 인한 상시 실패 방지).
on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          VER=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" -o /tmp/gl.tgz
          sudo tar -xzf /tmp/gl.tgz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan new commits only
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch -q origin "$BASE_REF"
            RANGE="origin/${BASE_REF}..HEAD"
          else
            if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
              RANGE="-1 ${HEAD_SHA}"
            else
              RANGE="${BEFORE_SHA}..${HEAD_SHA}"
            fi
          fi
          echo "Scanning commit range: $RANGE"
          gitleaks git . --log-opts="$RANGE" --config .gitleaks.toml --redact=100 --exit-code 1 --verbose
